<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty Claims Center | East Coast Electronics</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #responseMessage {
            margin-top: 20px;
            padding: 15px;
            display: none;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Warranty Claim Submission</h1>
    <p>Please provide your details and a description of the issue with your e-bike or component.</p>
    
    <form id="claimForm">
        <div class="form-group">
            <label for="customer_name">Full Name</label>
            <input type="text" id="customer_name" name="customer_name" required placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
            <label for="claim_details">Issue Description</label>
            <textarea id="claim_details" name="claim_details" rows="5" required placeholder="Describe the problem (e.g., BMS error, motor noise, etc.)"></textarea>
        </div>
        
        <button type="submit">Submit Claim</button>
    </form>

    <div id="responseMessage"></div>
</div>

<script>
    document.getElementById('claimForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const responseDiv = document.getElementById('responseMessage');
        const formData = {
            customer_name: document.getElementById('customer_name').value,
            claim_details: document.getElementById('claim_details').value
        };

        try {
            const response = await fetch('/submit-claim', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData),
            });

            const result = await response.json();

            if (response.ok) {
                responseDiv.className = 'success';
                responseDiv.style.display = 'block';
                responseDiv.innerHTML = `<strong>Success!</strong> ${result.message}. Your Reference ID is: ${result.reference_id}`;
                document.getElementById('claimForm').reset();
            } else {
                throw new Error(result.detail || 'Failed to submit claim');
            }
        } catch (error) {
            responseDiv.className = 'error';
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
        }
    });
</script>

</body>
</html>
